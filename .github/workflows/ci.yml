name: Grimoire CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: Nix (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
            nix_options: ''
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            nix_options: --max-jobs 1 --cores 2
          - runner: macos-15
            system: aarch64-darwin
            nix_options: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Install Metal toolchain
        if: runner.os == 'macOS'
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Check and build
        shell: bash
        run: |
          nix flake check --print-build-logs ${{ matrix.nix_options }}
          nix build --no-link --print-build-logs ${{ matrix.nix_options }} ".#packages.${{ matrix.system }}.default"

  windows:
    name: Windows (x86_64)
    runs-on: windows-2025
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt
      - name: Install protobuf compiler
        run: choco install protoc --yes --no-progress
      - name: Validate
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets
          cargo clippy --workspace --all-targets -- --deny warnings
          cargo test --workspace
          cargo build --workspace --release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: grimoire-windows-x86_64
          path: |
            target/release/peer-gpui.exe
            target/release/peer-cli.exe
          if-no-files-found: error
